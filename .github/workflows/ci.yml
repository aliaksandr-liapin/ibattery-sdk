name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-tests:
    name: C Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Configure tests
        run: cmake -B build_tests tests

      - name: Build tests
        run: cmake --build build_tests

      - name: Run tests
        run: ctest --test-dir build_tests --output-on-failure

  gateway-tests:
    name: Python Gateway Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gateway
        run: |
          cd gateway
          pip install -e ".[dev]"

      - name: Run pytest
        run: |
          cd gateway
          python -m pytest tests/ -v

name: Firmware Builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: Only ESP32-C3 is built in CI because it uses vanilla Zephyr.
# nRF52840-DK builds require Nordic Connect SDK (NCS) which is verified
# locally during development. STM32 builds require ZEPHYR_EXTRA_MODULES
# pointing to NCS hal_stm32.

jobs:
  esp32c3:
    name: ESP32-C3 (${{ matrix.config }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - config: default
            extra_args: ''
          - config: median filter
            extra_args: '-DCONFIG_BATTERY_VOLTAGE_FILTER_MEDIAN=y'
          - config: current sensing
            extra_args: '-DEXTRA_CONF_FILE=boards/esp32c3_devkitm_current.conf'

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: ibattery-sdk

      - name: Install west and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git cmake ninja-build gperf ccache dfu-util device-tree-compiler \
            wget python3-dev python3-pip python3-setuptools python3-tk \
            python3-wheel xz-utils file make gcc gcc-multilib g++-multilib \
            libsdl2-dev libmagic1
          pip3 install west

      - name: Initialize Zephyr workspace (vanilla)
        run: |
          west init --mr v4.2.2 zephyrproject
          cd zephyrproject
          west update --narrow -o=--depth=1
          west zephyr-export
          pip3 install -r zephyr/scripts/requirements-base.txt

      - name: Install Zephyr SDK (riscv64 only for ESP32-C3)
        run: |
          cd zephyrproject
          ZEPHYR_SDK_VERSION=0.16.8
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v${ZEPHYR_SDK_VERSION}/zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          rm zephyr-sdk-${ZEPHYR_SDK_VERSION}_linux-x86_64_minimal.tar.xz
          cd zephyr-sdk-${ZEPHYR_SDK_VERSION}
          ./setup.sh -t riscv64-zephyr-elf -h -c

      - name: Install ESP32 blobs
        run: |
          cd zephyrproject
          west blobs fetch hal_espressif

      - name: Build ESP32-C3 firmware
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyrproject/zephyr
          ZEPHYR_SDK_INSTALL_DIR: ${{ github.workspace }}/zephyrproject/zephyr-sdk-0.16.8
        run: |
          cd zephyrproject
          west build \
            -b esp32c3_devkitm \
            ${{ github.workspace }}/ibattery-sdk/app \
            -d build-output \
            --pristine -- ${{ matrix.extra_args }}

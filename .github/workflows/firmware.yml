name: Firmware Builds

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zephyr-build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4
      options: '--user root'
    env:
      ZEPHYR_TOOLCHAIN_VARIANT: zephyr
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-0.16.8

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: nRF52840-DK (default)
            board: nrf52840dk/nrf52840
            extra_args: ''
          - name: nRF52840-DK (median filter)
            board: nrf52840dk/nrf52840
            extra_args: '-DCONFIG_BATTERY_VOLTAGE_FILTER_MEDIAN=y'
          - name: nRF52840-DK (current sensing)
            board: nrf52840dk/nrf52840
            extra_args: '-DEXTRA_CONF_FILE=boards/nrf52840dk_nrf52840_current.conf'
          - name: ESP32-C3 (default)
            board: esp32c3_devkitm
            extra_args: ''
          - name: ESP32-C3 (current sensing)
            board: esp32c3_devkitm
            extra_args: '-DEXTRA_CONF_FILE=boards/esp32c3_devkitm_current.conf'

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4
        with:
          path: ibattery-sdk

      - name: Initialize Zephyr workspace
        working-directory: ${{ github.workspace }}
        run: |
          west init --mr v4.2.2 zephyrproject
          cd zephyrproject
          west update --narrow -o=--depth=1
          west zephyr-export

      - name: Install Python deps
        working-directory: ${{ github.workspace }}/zephyrproject
        run: pip3 install --break-system-packages -r zephyr/scripts/requirements.txt

      - name: Verify paths
        run: |
          echo "Workspace: ${{ github.workspace }}"
          ls -la ${{ github.workspace }}
          ls -la ${{ github.workspace }}/ibattery-sdk
          ls -la ${{ github.workspace }}/ibattery-sdk/app

      - name: Build
        working-directory: ${{ github.workspace }}/zephyrproject
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyrproject/zephyr
        run: |
          west build \
            -b ${{ matrix.board }} \
            ${{ github.workspace }}/ibattery-sdk/app \
            -d build_output \
            --pristine -- ${{ matrix.extra_args }}

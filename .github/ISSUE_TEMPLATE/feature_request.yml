name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for the Battery SDK? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include API sketches if relevant.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SoC estimation
        - Voltage / ADC
        - Temperature
        - Power management
        - Telemetry
        - HAL / porting
        - Testing
        - Documentation
        - Build / CI
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false

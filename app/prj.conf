CONFIG_MAIN_STACK_SIZE=4096
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_ADC=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Temperature source: NTC thermistor (default) or die sensor
# Switch to CONFIG_BATTERY_TEMP_DIE=y to use the internal die sensor
CONFIG_BATTERY_TEMP_NTC=y

# ── BLE Telemetry Transport ──────────────────────────────────────────
CONFIG_BATTERY_TRANSPORT=y
CONFIG_BATTERY_TRANSPORT_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="iBattery"
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
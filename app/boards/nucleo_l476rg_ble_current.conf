# NUCLEO-L476RG + X-NUCLEO-IDB05A1 BLE shield + INA219 current sensor.
# Combines BLE telemetry transport with coulomb-counting current sense so the
# v3 current_ma / coulomb_mah fields carry real data over BLE (lights up the
# Live Current + Remaining Charge Grafana panels end-to-end).
#
# Usage: west build -b nucleo_l476rg app -d build-stm32-ble-cur --pristine -- \
#   -DSHIELD=x_nucleo_idb05a1 \
#   -DEXTRA_CONF_FILE=boards/nucleo_l476rg_ble_current.conf \
#   -DZEPHYR_EXTRA_MODULES="/opt/nordic/ncs/v3.2.2/modules/hal/stm32"

# ── BLE transport (board default disables it) ──
CONFIG_BATTERY_TRANSPORT=y
CONFIG_BATTERY_TRANSPORT_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="iBattery-STM32"
CONFIG_SPI=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
# v3 telemetry is 32 bytes; a notification needs ATT_MTU >= 32 + 3 (ATT header).
CONFIG_BT_L2CAP_TX_MTU=35
CONFIG_BT_BUF_ACL_TX_SIZE=39
CONFIG_BT_BUF_ACL_RX_SIZE=39

# ── INA219 current sense + coulomb counting ──
CONFIG_I2C=y
CONFIG_BATTERY_CURRENT_SENSE=y
CONFIG_BATTERY_SOC_COULOMB=y
CONFIG_BATTERY_CAPACITY_MAH=220

# Board-specific Kconfig for ESP32-C3 DevKitM
# Auto-loaded by Zephyr build system (app/boards/<board>.conf)

CONFIG_ADC=y
CONFIG_SENSOR=y

# Use die temperature sensor — ESP32-C3 internal temp sensor via
# Zephyr sensor API.  NTC requires external hardware on GPIO3.
# Override with CONFIG_BATTERY_TEMP_NTC=y if NTC is connected.
CONFIG_BATTERY_TEMP_DIE=y

# ESP32-C3 has native BLE — enable transport by default.
CONFIG_BATTERY_TRANSPORT=y
CONFIG_BATTERY_TRANSPORT_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="iBattery-ESP32C3"
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
CONFIG_BT_L2CAP_TX_MTU=27
CONFIG_BT_BUF_ACL_TX_SIZE=31
CONFIG_BT_BUF_ACL_RX_SIZE=31

# TP4056 charger: disabled by default. Enable CONFIG_BATTERY_CHARGER_TP4056=y
# and set pin numbers when TP4056 hardware is wired.
# CONFIG_BATTERY_CHARGER_TP4056_CHRG_PIN=6
# CONFIG_BATTERY_CHARGER_TP4056_STDBY_PIN=7

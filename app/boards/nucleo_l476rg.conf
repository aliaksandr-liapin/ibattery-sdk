# Board-specific Kconfig for NUCLEO-L476RG
# Auto-loaded by Zephyr build system (app/boards/<board>.conf)

CONFIG_ADC=y

# Disable BLE by default — STM32L476 has no native BLE radio.
# Re-enable with shield: west build ... -- -DSHIELD=x_nucleo_idb05a1
CONFIG_BATTERY_TRANSPORT=n
CONFIG_BT=n

# TP4056 charger GPIO pins on GPIOC (PC6 = CHRG, PC7 = STDBY)
CONFIG_BATTERY_CHARGER_TP4056_CHRG_PIN=6
CONFIG_BATTERY_CHARGER_TP4056_STDBY_PIN=7

# Extra config for NUCLEO-L476RG + X-NUCLEO-IDB05A2 BLE shield.
# Usage: west build ... -- -DSHIELD=x_nucleo_idb05a1 -DEXTRA_CONF_FILE=boards/nucleo_l476rg_ble.conf

# Re-enable BLE transport (board default disables it)
CONFIG_BATTERY_TRANSPORT=y
CONFIG_BATTERY_TRANSPORT_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="iBattery-STM32"
CONFIG_SPI=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
# Sized for the largest wire format (v4 = 34 bytes): ATT_MTU >= 34 + 3.
# This conf has no current sense so it emits v3 today, but all BLE configs are
# kept uniform at 37/41 so enabling SoH never silently caps notifications
# (the original 27 capped payloads at 24 bytes and blocked v3 entirely).
CONFIG_BT_L2CAP_TX_MTU=37
CONFIG_BT_BUF_ACL_TX_SIZE=41
CONFIG_BT_BUF_ACL_RX_SIZE=41

apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: ibattery
      defaultBucket: telemetry
      tlsSkipVerify: true
    secureJsonData:
      token: ibattery-dev-token
    editable: true
